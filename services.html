{% extends "base.html" %}
{% block title %}Our Services – CarCare Mechanic{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Our Services</h1>
        <p>Comprehensive car care for every make and model</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="filter-bar">
            <button class="filter-btn active" data-cat="all">All Services</button>
            <button class="filter-btn" data-cat="Maintenance">Maintenance</button>
            <button class="filter-btn" data-cat="Repair">Repair</button>
            <button class="filter-btn" data-cat="Cleaning">Cleaning</button>
            <button class="filter-btn" data-cat="Tyres">Tyres</button>
            <button class="filter-btn" data-cat="Electrical">Electrical</button>
            <button class="filter-btn" data-cat="Body Work">Body Work</button>
            <button class="filter-btn" data-cat="Diagnostics">Diagnostics</button>
        </div>
        <div class="services-list" id="servicesList"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let allServices = [];
fetch('/api/services').then(r=>r.json()).then(svcs => {
    allServices = svcs;
    renderServices(svcs);
});

function renderServices(svcs) {
    const list = document.getElementById('servicesList');
    list.innerHTML = '';
    svcs.forEach(s => {
        list.innerHTML += `
        <div class="service-row-card" data-cat="${s.category}">
            <div class="svc-icon-wrap"><i class="fas ${s.icon}"></i></div>
            <div class="svc-details">
                <span class="service-cat">${s.category}</span>
                <h3>${s.name}</h3>
                <p>${s.description}</p>
                <div class="svc-tags">
                    <span><i class="fa-solid fa-clock"></i> ${s.duration}</span>
                    <span><i class="fa-solid fa-shield-halved"></i> Warranty Included</span>
                    <span><i class="fa-solid fa-truck"></i> Free Pickup</span>
                </div>
            </div>
            <div class="svc-price-wrap">
                <span class="svc-price">₹${s.price.toLocaleString()}</span>
                <span class="svc-price-label">onwards</span>
                <a href="/booking?service=${s.id}" class="btn-primary">Book Now</a>
            </div>
        </div>`;
    });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const cat = this.dataset.cat;
        renderServices(cat === 'all' ? allServices : allServices.filter(s => s.category === cat));
    });
});
</script>
{% endblock %}
