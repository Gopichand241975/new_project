{% extends "base.html" %}
{% block title %}My Dashboard – CarCare Mechanic{% endblock %}

{% block content %}
<div class="dash-header">
    <div class="container">
        <h1>My Bookings</h1>
        <p>Track and manage your service bookings</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="dash-stats" id="custStats"></div>

        <div class="filter-bar">
            <button class="filter-btn active" data-status="all">All</button>
            <button class="filter-btn" data-status="pending">Pending</button>
            <button class="filter-btn" data-status="confirmed">Confirmed</button>
            <button class="filter-btn" data-status="completed">Completed</button>
            <button class="filter-btn" data-status="rejected">Rejected</button>
        </div>

        <div class="bookings-list" id="bookingsList"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let myBookings = [];

async function loadBookings() {
    const me = await fetch('/api/me').then(r=>r.json());
    if (!me.logged_in) { window.location='/'; return; }

    myBookings = await fetch('/api/my-bookings').then(r=>r.json());
    renderStats();
    renderBookings(myBookings);
}

function renderStats() {
    const total = myBookings.length;
    const pending = myBookings.filter(b=>b.status==='pending').length;
    const completed = myBookings.filter(b=>b.status==='completed').length;
    const spent = myBookings.filter(b=>b.payment_status==='paid').reduce((s,b)=>s+b.total_amount,0);
    document.getElementById('custStats').innerHTML = `
        <div class="dstat-card"><i class="fa-solid fa-calendar"></i><div><span class="dstat-num">${total}</span><span>Total Bookings</span></div></div>
        <div class="dstat-card warn"><i class="fa-solid fa-clock"></i><div><span class="dstat-num">${pending}</span><span>Pending</span></div></div>
        <div class="dstat-card success"><i class="fa-solid fa-circle-check"></i><div><span class="dstat-num">${completed}</span><span>Completed</span></div></div>
        <div class="dstat-card accent"><i class="fa-solid fa-indian-rupee-sign"></i><div><span class="dstat-num">₹${spent.toLocaleString()}</span><span>Total Spent</span></div></div>
    `;
}

function statusBadge(status) {
    const map = {
        pending: ['badge-warn','Pending Approval'],
        confirmed: ['badge-info','Confirmed'],
        completed: ['badge-success','Completed'],
        rejected: ['badge-error','Rejected']
    };
    const [cls, label] = map[status] || ['badge-warn', status];
    return `<span class="badge ${cls}">${label}</span>`;
}

function renderBookings(list) {
    const wrap = document.getElementById('bookingsList');
    if (list.length === 0) {
        wrap.innerHTML = `<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><h3>No bookings yet</h3><p>Book your first service to see it here</p><a href="/booking" class="btn-primary">Book a Service</a></div>`;
        return;
    }
    wrap.innerHTML = list.map(b => `
        <div class="booking-card">
            <div class="booking-card-icon"><i class="fas ${b.icon}"></i></div>
            <div class="booking-card-body">
                <div class="booking-card-top">
                    <h3>${b.service_name}</h3>
                    ${statusBadge(b.status)}
                </div>
                <div class="booking-card-meta">
                    <span><i class="fa-solid fa-car"></i> ${b.car_make} ${b.car_model} (${b.car_year})</span>
                    <span><i class="fa-solid fa-calendar"></i> ${b.booking_date} at ${b.booking_time}</span>
                    <span><i class="fa-solid fa-location-dot"></i> ${b.address}</span>
                </div>
                ${b.notes ? `<p class="booking-notes">"${b.notes}"</p>` : ''}
            </div>
            <div class="booking-card-action">
                <span class="booking-price">₹${b.total_amount.toLocaleString()}</span>
                ${b.payment_status === 'paid'
                    ? '<span class="badge badge-success"><i class="fa-solid fa-check"></i> Paid</span>'
                    : (b.status === 'confirmed' || b.status === 'pending'
                        ? `<button class="btn-primary btn-sm" onclick='openPaymentModal(${b.id}, "${b.service_name}", ${b.total_amount})'>Pay Now</button>`
                        : '<span class="badge badge-error">Unpaid</span>')
                }
            </div>
        </div>
    `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const status = this.dataset.status;
        renderBookings(status === 'all' ? myBookings : myBookings.filter(b => b.status === status));
    });
});

loadBookings();
</script>
{% endblock %}
